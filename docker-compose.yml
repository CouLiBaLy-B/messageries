version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: messaging
      POSTGRES_PASSWORD: messaging_dev_pwd
      POSTGRES_DB: messaging
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messaging"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio_admin minio_admin_password &&
        mc mb -p local/messaging-attachments || true &&
        mc anonymous set none local/messaging-attachments
      "

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports: ["3310:3310"]
    profiles: ["scan"]

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      APP_URL: http://localhost:8080
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: messaging
      DB_PASSWORD: messaging_dev_pwd
      DB_NAME: messaging
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_only_change_me_to_a_long_random_secret_min_32_chars
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: messaging-attachments
      S3_ACCESS_KEY: minio_admin
      S3_SECRET_KEY: minio_admin_password
      S3_FORCE_PATH_STYLE: "true"
      ENCRYPT_MESSAGE_BODY: "true"
      KMS_DRIVER: local
      KMS_LOCAL_KEYS: "dev-key-1:8b3J5p3xCq8mE+rNc7sV1WqA9oZqL6f0YtVjK2dGq5w="
      KMS_LOCAL_ACTIVE: dev-key-1
      OUTBOX_WORKER_ENABLED: "true"
      EMAIL_DRIVER: log
      EMAIL_FROM: noreply@example.com
    ports: ["3000:3000"]
    command: ["sh", "-c", "npm run migration:run && node dist/main.js"]

volumes:
  pgdata:
  redisdata:
  miniodata:
