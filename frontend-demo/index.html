<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Démo Messagerie E-commerce</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #6366f1;
    --me: #4f46e5;
    --other: #475569;
    --ok: #10b981;
    --warn: #f59e0b;
    --err: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: grid; grid-template-rows: auto 1fr;
  }
  header {
    padding: 12px 20px; background: var(--panel);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid #0008;
  }
  header h1 { margin: 0; font-size: 16px; flex: 1; }
  .status { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: var(--err); }
  .status.ok { background: var(--ok); }
  main { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
  aside {
    background: var(--panel); border-right: 1px solid #0006;
    display: flex; flex-direction: column;
  }
  aside h2 { font-size: 13px; padding: 12px 16px; margin: 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #0004;
  }
  .conv-item:hover, .conv-item.active { background: var(--panel2); }
  .conv-item .subject { font-weight: 600; font-size: 14px; }
  .conv-item .last { font-size: 12px; color: var(--muted); margin-top: 2px; }

  section.chat { display: flex; flex-direction: column; min-width: 0; }
  .chat-header {
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid #0006;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg { max-width: 70%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .msg.me { align-self: flex-end; background: var(--me); }
  .msg.other { align-self: flex-start; background: var(--other); }
  .msg .meta { font-size: 10px; color: #cbd5e1; opacity: .7; margin-top: 4px; }
  .composer {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #0006;
    background: var(--panel);
  }
  .composer input {
    flex: 1; padding: 10px 14px; border: none; border-radius: 999px;
    background: var(--panel2); color: var(--text); outline: none;
  }
  .composer button {
    padding: 0 18px; border: none; border-radius: 999px;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  .composer button:disabled { opacity: .4; cursor: not-allowed; }

  /* Login modal */
  .modal {
    position: fixed; inset: 0; background: #000a;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--panel); padding: 24px; border-radius: 12px;
    width: 360px; display: flex; flex-direction: column; gap: 10px;
  }
  .login-card h2 { margin: 0 0 8px; }
  .login-card input, .login-card select, .login-card button {
    padding: 10px 12px; border: 1px solid var(--panel2);
    background: var(--bg); color: var(--text); border-radius: 8px;
  }
  .login-card button { background: var(--accent); border: none; cursor: pointer; font-weight: 600; }
  .login-card .row { display: flex; gap: 8px; }
  .login-card .row > * { flex: 1; }
  .typing { font-size: 11px; color: var(--muted); padding: 0 20px 4px; }
  .err-banner { background: var(--err); color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 13px; }
  small.hint { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>🛒 Messagerie e-commerce — démo</h1>
  <span id="who" style="font-size:12px;color:var(--muted)"></span>
  <span id="connStatus" class="status">offline</span>
  <button id="exportBtn" style="display:none;padding:6px 12px;border:none;border-radius:6px;background:var(--panel2);color:var(--text);cursor:pointer">Export RGPD</button>
  <button id="logoutBtn" style="display:none;padding:6px 12px;border:none;border-radius:6px;background:var(--panel2);color:var(--text);cursor:pointer">Logout</button>
</header>

<main>
  <aside>
    <h2>Conversations</h2>
    <div class="conv-list" id="convList"></div>
    <div style="padding:12px;border-top:1px solid #0006;">
      <small class="hint">Ouvrir par commande :</small>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input id="orderIdInput" placeholder="orderId (uuid)" style="flex:1;padding:6px;border-radius:6px;border:none;background:var(--panel2);color:var(--text);font-size:12px" />
        <button id="openOrderBtn" style="padding:6px 10px;border:none;border-radius:6px;background:var(--accent);color:white;cursor:pointer">Ouvrir</button>
      </div>
    </div>
  </aside>

  <section class="chat">
    <div class="chat-header" id="chatHeader">
      <em style="color:var(--muted)">Sélectionnez une conversation</em>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing" id="typing"></div>
    <form class="composer" id="composer">
      <input id="msgInput" placeholder="Écrire un message..." maxlength="4000" autocomplete="off" disabled />
      <button type="submit" id="sendBtn" disabled>Envoyer</button>
    </form>
  </section>
</main>

<div class="modal" id="loginModal">
  <div class="login-card">
    <h2>Connexion</h2>
    <div id="loginErr" class="err-banner" style="display:none"></div>
    <input id="apiUrl" value="http://localhost:3000/api/v1" />
    <input id="loginEmail" placeholder="email" type="email" />
    <input id="loginPwd" placeholder="mot de passe" type="password" />
    <div class="row">
      <button id="loginBtn">Se connecter</button>
      <button id="registerBtn" style="background:var(--panel2)">Créer compte</button>
    </div>
    <small class="hint">Pour créer un compte : email + password 12+ caractères. Rôle = customer.</small>
  </div>
</div>

<script type="module" src="./app.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</body>
</html>
