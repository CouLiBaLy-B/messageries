name: Deploy Staging

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/terraform/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC vers AWS
  contents: read

env:
  AWS_REGION: eu-west-3
  ENV: staging
  ECR_REPO: messaging-staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with: { platforms: arm64 }

      - name: Build and push image
        id: build
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.registry }}/${ECR_REPO}:${{ github.sha }}
          docker buildx build \
            --platform linux/arm64 \
            --provenance false \
            -t "$IMAGE_URI" \
            -t "${{ steps.ecr.outputs.registry }}/${ECR_REPO}:latest" \
            --push \
            ./backend
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Run DB migrations (ECS one-shot)
        run: ./infra/scripts/run-migrations.sh staging

      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster messaging-staging \
            --service messaging-staging-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster messaging-staging \
            --services messaging-staging-api \
            --region ${{ env.AWS_REGION }}
