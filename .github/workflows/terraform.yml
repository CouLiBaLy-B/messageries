name: Terraform

on:
  pull_request:
    paths: ['infra/terraform/**']
  push:
    branches: [main]
    paths: ['infra/terraform/**']

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan-staging:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: infra/terraform/envs/staging } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.7.5 }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: eu-west-3
      - name: Format
        run: terraform fmt -check -recursive ../../..
      - name: Init
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with: { working_directory: infra/terraform }
        continue-on-error: true
      - name: Init (with backend)
        if: github.event_name == 'pull_request'
        run: terraform init
      - name: Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -lock-timeout=5m
