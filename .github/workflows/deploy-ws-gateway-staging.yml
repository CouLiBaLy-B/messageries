name: Deploy WS Gateway Staging (AWS)

# Manual only — see deploy-staging.yml rationale.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-3
  ECR_REPO: messaging-staging-ws

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}" ]; then
            echo "::warning::AWS_DEPLOY_ROLE_ARN_STAGING secret not set — skipping deploy"
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with: { platforms: arm64 }
      - name: Build & push image
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/${ECR_REPO}:${{ github.sha }}
          docker buildx build --platform linux/arm64 --provenance false \
            -t "$IMAGE" \
            -t "${{ steps.ecr.outputs.registry }}/${ECR_REPO}:latest" \
            --push ./ws-gateway
      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster messaging-staging \
            --service messaging-staging-ws-ws \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
      - name: Wait stable
        run: |
          aws ecs wait services-stable \
            --cluster messaging-staging \
            --services messaging-staging-ws-ws \
            --region ${{ env.AWS_REGION }}
