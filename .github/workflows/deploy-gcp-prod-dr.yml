name: Deploy GCP Prod-DR (passive)

# Manual only. Build l'image et update le service Cloud Run DR sans bouger le trafic.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  GCP_REGION_DR: europe-west4
  SERVICE_DR: messaging-prod-dr-api

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.GCP_WIF_PROVIDER_PROD_DR }}" ] \
            || [ -z "${{ secrets.GCP_DEPLOY_SA_PROD_DR }}" ] \
            || [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::warning::GCP DR secrets not all set — skipping deploy"
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy-dr:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PROD_DR }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_PROD_DR }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION_DR }}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build & push image (DR registry)
        id: build
        run: |
          REPO=${{ env.GCP_REGION_DR }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/messaging-prod-dr-docker
          IMAGE=$REPO/api:${{ github.sha }}
          docker buildx build --platform linux/amd64 --provenance false \
            -t "$IMAGE" \
            -t "$REPO/api:latest" \
            --push ./backend
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
      - name: Deploy to Cloud Run DR (passive, no migration)
        run: |
          gcloud run deploy ${{ env.SERVICE_DR }} \
            --image ${{ steps.build.outputs.image }} \
            --region ${{ env.GCP_REGION_DR }} \
            --no-traffic \
            --quiet
      - name: Promote new revision to 100%
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_DR }} \
            --region ${{ env.GCP_REGION_DR }} \
            --to-latest \
            --quiet
