name: Deploy GCP Staging

# Manual only — secrets requis :
# GCP_WIF_PROVIDER_STAGING, GCP_DEPLOY_SA_STAGING, GCP_PROJECT_ID
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  GCP_REGION: europe-west1
  SERVICE: messaging-staging-api

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.GCP_WIF_PROVIDER_STAGING }}" ] \
            || [ -z "${{ secrets.GCP_DEPLOY_SA_STAGING }}" ] \
            || [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::warning::GCP secrets not all set — skipping deploy"
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_STAGING }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build & push image
        id: build
        run: |
          REPO=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/messaging-staging-docker
          IMAGE=$REPO/api:${{ github.sha }}
          docker buildx build --platform linux/amd64 --provenance false \
            -t "$IMAGE" \
            -t "$REPO/api:latest" \
            --push ./backend
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
      - name: Run migrations (Cloud Run Job)
        run: ./infra/terraform-gcp/scripts/run-migrations.sh staging
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ steps.build.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --quiet
