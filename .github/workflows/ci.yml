name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow_e2e:
        description: 'Run slow e2e (OpenSearch, NATS, E2EE, fake-gcs)'
        required: false
        default: 'false'

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: e2e fast (Postgres+Redis+MinIO)
        run: npm run test:e2e
        env:
          NODE_ENV: test

  e2e-slow:
    # Slow e2e (OpenSearch, NATS, E2EE, GCS) → manual only par défaut.
    # Aussi déclenché si workflow_dispatch.inputs.run_slow_e2e == 'true'
    if: github.event_name == 'workflow_dispatch' && inputs.run_slow_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: e2e slow (OpenSearch, NATS, E2EE)
        run: npm run test:e2e:slow
        env:
          NODE_ENV: test

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high || true

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: javascript }
      - uses: github/codeql-action/analyze@v3
